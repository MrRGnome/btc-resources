<script>
    function toggleDarkLight(){
		try{
			var newMode=localStorage.getItem('mode')=="dark"?"":"dark";
			localStorage.setItem("mode",newMode);
		}catch(ex){
			var newMode=document.cookie.split(";")[0].split("=")[1]=="dark"?"":"dark";var date=new Date();
			date.setTime(date.getTime()+(365*24*60*60*1000));
			document.cookie="mode="+newMode+";expires="+date.toGMTString();
		}
		applyDarkLightMode()
	}
	function applyDarkLightMode(){
		var currentClass;
		try{
			currentClass=localStorage.getItem('mode');
		}catch(ex){
			currentClass=document.cookie.split(";")[0].split("=")[1];
		}
		var currentRef = document.getElementById("mystyle").getAttribute("href");
		if(currentClass == "dark")
			document.getElementById("mystyle").setAttribute("href", currentRef.replace("style.css", "dark.css"));
		else
			document.getElementById("mystyle").setAttribute("href", currentRef.replace("dark.css", "style.css"));

		var toggle=document.querySelector('.toggle-input');
		toggle.checked=!toggle.checked;
	}

	var toggle=document.querySelector('.toggle-input');
	if(toggle){
		toggle.addEventListener('change',function(){toggleDarkLight()});
	}
	applyDarkLightMode();

	var menuExpand = document.getElementsByClassName("navbar-toggle")[0];
	menuExpand.addEventListener("click",function () {
		$(menuExpand).toggleClass("collapsed");
		$(document.getElementsByClassName("navbar-collapse")[0]).toggleClass("show");
	});

	(function loadNavResourceSearch() {
		function loadScriptOnce(scriptId, src, callback) {
			var existing = document.getElementById(scriptId);
			if (existing) {
				var isLoaded = existing.getAttribute("data-loaded") === "true";
				if (isLoaded) {
					if (typeof callback === "function") {
						callback();
					}
					return;
				}
				existing.addEventListener("load", function onLoad() {
					existing.removeEventListener("load", onLoad);
					existing.setAttribute("data-loaded", "true");
					if (typeof callback === "function") {
						callback();
					}
				});
				return;
			}

			var script = document.createElement("script");
			script.id = scriptId;
			script.src = src;
			script.async = false;
			script.addEventListener("load", function () {
				script.setAttribute("data-loaded", "true");
				if (typeof callback === "function") {
					callback();
				}
			});
			document.body.appendChild(script);
		}

		var basePath = (TemplateEngine.settings.SUBDIRECTORY || "");
		loadScriptOnce("nav-resource-search-script", basePath + "/js/nav-resource-search.js");
	})();
</script>
